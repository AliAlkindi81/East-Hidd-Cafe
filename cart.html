<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>سلة التسوق</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ------------------ BODY ------------------ */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #fafafa;
            direction: rtl;
            text-align: right;
        }

        /* ------------------ HEADER ------------------ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .menu-icon {
            font-size: 25px;
            cursor: pointer;
        }

        .header-logo {
            height: 60px;
            margin: 0 auto;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .cart {
            font-size: 20px;
        }

        #cart-count {
            background: red;
            color: white;
            padding: 3px 7px;
            border-radius: 50%;
            font-size: 12px;
        }

        .today-date {
            font-size: 13px;
            background: #eee;
            padding: 4px 10px;
            border-radius: 15px;
        }

        /* ------------------ SIDE MENU ------------------ */
        .side-menu {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            direction: rtl;
        }

        .side-menu a {
            padding: 10px 30px;
            text-decoration: none;
            font-size: 18px;
            color: #fff;
            display: block;
            transition: 0.3s;
        }

        .side-menu a:hover {
            background-color: #575757;
        }

        .side-menu .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 30px;
        }

        /* ------------------ TITLE ------------------ */
        .title {
            text-align: center;
            margin-top: 20px;
        }

        /* ------------------ CART ITEMS ------------------ */
        #cart-items {
            padding: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
        }

        .item-info {
            flex: 1;
        }

        .qty-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .qty-controls button {
            border: none;
            background: #ff6600;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
        }

        /* ------------------ TOTAL ------------------ */
        .cart-total {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin: 20px;
        }

        /* ------------------ CONTINUE SHOPPING ------------------ */
        .continue-btn {
            display: block;
            width: 200px;
            margin: auto;
            text-align: center;
            background: #ff6600;
            color: white;
            padding: 10px;
            border-radius: 20px;
            text-decoration: none;
        }

        /* ------------------ ORDER FORM ------------------ */
        .order-form {
            padding: 20px;
        }

        .order-form input,
        .order-form textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .order-form textarea {
            height: 80px;
        }

        #send-order {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .payment-note {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        /* ------------------ EMPTY CART ------------------ */
        .empty-cart {
            text-align: center;
            color: #555;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="menu-icon" id="menu-button">☰</div>
        <a href="index.html"><img src="logo.jpg" class="header-logo"></a>
        <div class="header-right">
            <div class="cart">🛒 <span id="cart-count">0</span></div>
            <span class="separator">|</span>
            <div class="today-date" id="today-date"></div>
        </div>
    </header>

    <!-- SIDE MENU -->
    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn">&times;</a>
        <a href="index.html">🏠 الرئيسية</a>
        <a href="pickup.html">📦 منتجاتنا</a>
        <a href="contact.html">📞 إتصل بنا</a>
        <a href="cart.html">🛒 سلة التسوق</a>
    </div>

    <!-- PAGE TITLE -->
    <h1 class="title">🛒 سلة التسوق</h1>

    <!-- CART ITEMS -->
    <div id="cart-items"></div>

    <!-- TOTAL -->
    <div class="cart-total">
        المجموع: <span id="total-price">0</span> BD
    </div>

    <!-- CONTINUE SHOPPING -->
    <a href="pickup.html" class="continue-btn">⬅ متابعة التسوق</a>

    <!-- ORDER FORM -->
    <div class="order-form">
        <h2>بيانات الطلب</h2>
        <input type="text" id="customer-name" placeholder="الاسم">
        <input type="tel" id="customer-phone" placeholder="رقم الهاتف">
        <textarea id="customer-note" placeholder="ملاحظات (اختياري)"></textarea>
        <button id="send-order">إرسال الطلب عبر واتساب</button>
        <p class="payment-note">بعد إرسال الطلب يرجى إرسال Screenshot من BenefitPay</p>
    </div>

    <!-- ------------------ SCRIPT ------------------ -->
    <script>
        // ------------------ SIDE MENU ------------------
        const menuButton = document.getElementById("menu-button");
        const sideMenu = document.getElementById("side-menu");
        const closeBtn = document.querySelector(".close-btn");

        menuButton.onclick = () => sideMenu.style.width = "250px";
        closeBtn.onclick = () => sideMenu.style.width = "0";

        // ------------------ DATE ------------------
        const today = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById("today-date").textContent = today.toLocaleDateString("ar-BH", options);

        // ------------------ CART ------------------
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const cartContainer = document.getElementById("cart-items");
        const totalPriceElement = document.getElementById("total-price");

        function renderCart() {
            cartContainer.innerHTML = "";
            let total = 0;

            if (cart.length === 0) {
                cartContainer.innerHTML = `<p class="empty-cart">السلة فارغة</p>`;
            }

            cart.forEach((item, index) => {
                total += item.price * item.qty;
                cartContainer.innerHTML += `
                <div class="cart-item">
                    <div class="item-info">
                        <b>${item.name}</b><br>
                        ${item.price.toFixed(3)} BD
                    </div>
                    <div class="qty-controls">
                        <button onclick="decreaseQty(${index})">−</button>
                        <span>${item.qty}</span>
                        <button onclick="increaseQty(${index})">+</button>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${index})">حذف</button>
                </div>`;
            });

            totalPriceElement.textContent = total.toFixed(3);
            document.getElementById("cart-count").textContent = cart.reduce((sum, i) => sum + i.qty, 0);
            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function increaseQty(index) {
            cart[index].qty++;
            renderCart();
        }

        function decreaseQty(index) {
            if (cart[index].qty > 1) cart[index].qty--;
            renderCart();
        }

        function deleteItem(index) {
            cart.splice(index, 1);
            renderCart();
        }

        renderCart();

        // ------------------ SEND ORDER VIA WHATSAPP ------------------
        document.getElementById("send-order").onclick = function () {
            let name = document.getElementById("customer-name").value.trim();
            let phone = document.getElementById("customer-phone").value.trim();
            let note = document.getElementById("customer-note").value.trim();

            if (name === "" || phone === "") {
                alert("يرجى إدخال الاسم ورقم الهاتف");
                return;
            }

            if (cart.length === 0) {
                alert("السلة فارغة!");
                return;
            }

            let message = "طلب جديد:%0A";
            cart.forEach(item => {
                message += `${item.name} × ${item.qty}%0A`;
            });

            message += `%0Aالمجموع: ${totalPriceElement.textContent} BD`;
            message += `%0Aالاسم: ${name}`;
            message += `%0Aالهاتف: ${phone}`;
            message += `%0Aملاحظات: ${note}`;

            let phoneNumber = "973XXXXXXXX"; // ضع رقم واتساب الصحيح
            let url = `https://wa.me/${phoneNumber}?text=${message}`;
            window.open(url);

            cart = [];
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
            alert("تم إرسال الطلب! يمكنك الآن الاستمرار بالتسوق.");
        }
    </script>

</body>

</html>
