<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <title>لوحة التحكم</title>

    <link rel="stylesheet" href="admin.css">

</head>

<body>

    <div class="admin-container">

        <h1>لوحة إدارة المنتجات</h1>

        <div class="form-box">

            <select id="category">

                <option value="sandwich">سندويشات</option>

                <option value="drinks">مشروبات</option>

                <option value="sweets">حلويات</option>

            </select>

            <input type="text" id="name" placeholder="اسم المنتج">

            <textarea id="desc" placeholder="وصف المنتج"></textarea>

            <input type="number" id="price" placeholder="السعر">

            <input type="text" id="offer" placeholder="ملاحظة العرض (اختياري)">

            <input type="file" id="image" accept="image/jpeg,image/png">

            <button id="addBtn">إضافة المنتج</button>

        </div>

        <h2>المنتجات</h2>

        <div id="itemsList"></div>

    </div>

    <script src="admin.js"></script>

</body>

</html>
